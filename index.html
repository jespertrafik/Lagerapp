// ====== THEME TOGGLE ======
function toggleTheme() {
  const isLight = document.body.classList.toggle('light-mode');
  localStorage.setItem('lager-theme', isLight ? 'light' : 'dark');
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = isLight ? '#f5f5f5' : '#0a0a0a';
  render();
}

function applyTheme() {
  const saved = localStorage.getItem('lager-theme');
  if (saved === 'light') {
    document.body.classList.add('light-mode');
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = '#f5f5f5';
  }
}
applyTheme();

// ====== VIEW MODE ======
function applyViewMode(mode) {
  viewMode = mode;
  const vm = VIEW_MODES.find(v => v.id === mode) || VIEW_MODES[0];
  const isLight = document.body.classList.contains('light-mode');
  document.body.className = "";
  if (vm.sizeClass) document.body.classList.add(vm.sizeClass);
  if (vm.themeClass) document.body.classList.add(vm.themeClass);
  if (isLight) document.body.classList.add('light-mode');
  // Update theme-color meta
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = isLight ? '#f5f5f5' : '#0a0a0a';
}

function setViewMode(mode) {
  applyViewMode(mode);
  showSettings = false;
  if (currentUser) {
    db.ref("users/" + currentUser.uid + "/viewMode").set(mode);
  }
  render();
}

function loadViewMode() {
  if (!currentUser) return;
  db.ref("users/" + currentUser.uid + "/viewMode").once("value").then(snap => {
    const mode = snap.val();
    if (mode && VIEW_MODES.find(v => v.id === mode)) {
      applyViewMode(mode);
    } else {
      applyViewMode(VIEW_MODES[0].id);
      db.ref("users/" + currentUser.uid + "/viewMode").set(VIEW_MODES[0].id);
    }
    render();
  });
}

const ADMIN_EMAIL = "jespertrafik@gmail.com";

// ====== AUTH ======
auth.onAuthStateChanged((user) => {
  if (user) {
    // Check allowlist
    db.ref("allowedUsers").once("value").then(allSnap => {
      const allUsers = allSnap.val();
      if (!allUsers) {
        // First user ever — auto-approve as admin
        const role = user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase() ? "admin" : "user";
        db.ref("allowedUsers/" + user.uid).set({ email: user.email, name: user.displayName || "", role: role, added: Date.now() });
        currentUser = user;
        loginError = "";
        loadViewMode();
        initDB();
        return;
      }
      // Check by UID
      if (allUsers[user.uid]) {
        currentUser = user;
        loginError = "";
        loadViewMode();
        initDB();
        return;
      }
      // Check by email (pending users)
      const pendingKey = Object.keys(allUsers).find(k => allUsers[k].email.toLowerCase() === user.email.toLowerCase() && allUsers[k].pending);
      if (pendingKey) {
        // Activate: remove pending, add with real UID
        db.ref("allowedUsers/" + pendingKey).remove();
        db.ref("allowedUsers/" + user.uid).set({ email: user.email, name: user.displayName || "", role: "user", added: Date.now() });
        currentUser = user;
        loginError = "";
        loadViewMode();
        initDB();
        return;
      }
      // Not allowed
      loginError = "⛔ Du har inte tillgång. Kontot kan ha tagits bort — kontakta admin.";
      auth.signOut();
    });
  } else {
    currentUser = null;
    items = {};
    applyViewMode("compact");
    renderLogin();
  }
});

function doLogin() {
  loginError = "";
  auth.signInWithPopup(googleProvider).catch((err) => {
    if (err.code === "auth/popup-blocked") {
      auth.signInWithRedirect(googleProvider);
    } else if (err.code !== "auth/popup-closed-by-user") {
      loginError = "Inloggning misslyckades: " + err.message;
      renderLogin();
    }
  });
}

let loginMode = "login"; // "login" | "register"

function doEmailLogin() {
  const email = (document.getElementById("login-email").value || "").trim();
  const password = document.getElementById("login-password").value || "";
  if (!email || !password) { loginError = "Ange e-post och lösenord."; renderLogin(); return; }
  loginError = "";
  auth.signInWithEmailAndPassword(email, password).catch((err) => {
    if (err.code === "auth/user-not-found" || err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") {
      // Check if email is in allowlist as pending — if so, auto-create the account
      db.ref("allowedUsers").once("value").then(snap => {
        const allUsers = snap.val();
        const pendingKey = allUsers && Object.keys(allUsers).find(k =>
          allUsers[k].email.toLowerCase() === email.toLowerCase() && allUsers[k].pending
        );
        if (pendingKey) {
          if (password.length < 6) {
            loginError = "Lösenordet måste vara minst 6 tecken.";
            renderLogin();
            return;
          }
          auth.createUserWithEmailAndPassword(email, password).catch((createErr) => {
            loginError = createErr.code === "auth/weak-password"
              ? "Lösenordet måste vara minst 6 tecken."
              : "Kunde inte skapa konto: " + createErr.message;
            renderLogin();
          });
        } else {
          loginError = "Fel e-post eller lösenord. Inte tillagd i systemet? Be admin lägga till din mejl.";
          renderLogin();
        }
      });
    } else if (err.code === "auth/invalid-email") {
      loginError = "Ogiltig e-postadress.";
      renderLogin();
    } else if (err.code === "auth/operation-not-allowed") {
      loginError = "E-post/lösenord är inte aktiverat i Firebase.";
      renderLogin();
    } else {
      loginError = "Inloggning misslyckades: " + err.message;
      renderLogin();
    }
  });
}

function doRegister() {
  const email = (document.getElementById("login-email").value || "").trim();
  const password = document.getElementById("login-password").value || "";
  if (!email || !password) { loginError = "Ange e-post och lösenord."; renderLogin(); return; }
  if (password.length < 6) { loginError = "Lösenordet måste vara minst 6 tecken."; renderLogin(); return; }
  loginError = "";
  auth.createUserWithEmailAndPassword(email, password).catch((err) => {
    if (err.code === "auth/email-already-in-use") {
      loginError = "Det finns redan ett konto med den e-postadressen.";
    } else if (err.code === "auth/invalid-email") {
      loginError = "Ogiltig e-postadress.";
    } else if (err.code === "auth/weak-password") {
      loginError = "För svagt lösenord.";
    } else if (err.code === "auth/operation-not-allowed") {
      loginError = "E-post/lösenord är inte aktiverat i Firebase.";
    } else {
      loginError = "Registrering misslyckades: " + err.message;
    }
    renderLogin();
  });
}

function doLogout() { auth.signOut(); }

function renderLogin() {
  const isRegister = loginMode === "register";
  document.getElementById("app").innerHTML = `
    <div class="login-screen">
      <div class="login-title">📦 Lager</div>

// ====== TELEGRAM ======
async function sendTelegram(item) {
  const deptName = DEPARTMENTS.find(d => d.id === activeDept)?.name || activeDept;
  const text = `⚠ Lågt saldo!\n${item.name}: ${item.qty} ${item.unit} kvar (min: ${item.min})\nAvdelning: ${deptName}`;
  try {
    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text }),
    });
  } catch (e) { console.error("Telegram-notis misslyckades:", e); }
}

// ====== TOAST ======
async function resetDeptToDefault() {
  const deptNames = { tvattstugor: "Tvättstugor", vitvaror: "Vitvaror", storkok: "Storkök" };
  const name = deptNames[activeDept] || activeDept;
  if (!confirm(`Återställ ${name} till defaultartiklar? All nuvarande data för avdelningen raderas!`)) return;
  const defaults = activeDept === "tvattstugor" ? DEFAULT_TVATTSTUGOR : activeDept === "vitvaror" ? DEFAULT_VITVAROR : DEFAULT_STORKOK;
  const ref = getItemsRef();
  await ref.remove();
  for (const item of defaults) {
    const key = (item.artnr || item.name).replace(/[.#$\/\[\]]/g, "_");
    await ref.child(key).set({ name: item.name, unit: item.unit, qty: item.qty, min: item.min, brand: item.brand, price: item.price || 0, artnr: item.artnr || "" });
  }
  showToast(`${name} återställd!`);
}

function showToast(msg) {
  toastMsg = msg;
  render();
  if (toastTimeout) clearTimeout(toastTimeout);
  const duration = msg.includes("❌") || msg.includes("⚠") ? 5000 : 2500;
  toastTimeout = setTimeout(() => { toastMsg = ""; render(); }, duration);
}

// ====== DB ======
function initDB() {
  listenToDept(activeDept);
  autoBackup();
  db.ref("log").orderByChild("timestamp").limitToLast(50).on("value", (snap) => {
    const data = snap.val();
    logEntries = data ? Object.values(data).sort((a, b) => b.timestamp - a.timestamp) : [];
    if (showLog) render();
  });
  // Listen to allowed users (admin)
  db.ref("allowedUsers").on("value", (snap) => {
    allowedUsers = snap.val() || {};
    // Check if current user is admin
    if (currentUser) {
      isAdmin = allowedUsers[currentUser.uid]?.role === "admin"
        || currentUser.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    }
    render();
  });
}

// ====== ADMIN ======
async function addAllowedUser() {
  const emailInput = document.getElementById("admin_email");
  const email = emailInput.value.trim().toLowerCase();
  if (!email || !email.includes("@")) { showToast("Ange en giltig mejladress"); return; }
  // Check if already exists
  const existing = Object.values(allowedUsers).find(u => u.email.toLowerCase() === email);
  if (existing) { showToast("Användaren finns redan"); return; }
  // We need to create a placeholder entry with email as key (will be replaced when user logs in)
  const placeholderKey = "pending_" + email.replace(/[.#$/\[\]@]/g, "_");
  await db.ref("allowedUsers/" + placeholderKey).set({ email: email, name: "", role: "user", added: Date.now(), pending: true });
  emailInput.value = "";
  showToast(`${email} tillagd!`);
}

async function removeAllowedUser(uid) {
  const user = allowedUsers[uid];
  if (!user) return;
  if (user.role === "admin") { showToast("Kan inte ta bort admin"); return; }
  if (confirm(`Ta bort ${user.email}?`)) {
    await db.ref("allowedUsers/" + uid).remove();
    showToast(`${user.email} borttagen`);
  }
}

function listenToDept(dept) {
  if (currentListener) currentListener.off();
  const ref = db.ref("departments/" + dept + "/items");
  currentListener = ref;
  ref.on("value", (snap) => {
    const data = snap.val();
    if (data) {
      items = data;
    } else {
      // Load defaults per department
      const defaults = dept === "tvattstugor" ? DEFAULT_TVATTSTUGOR : dept === "vitvaror" ? DEFAULT_VITVAROR : dept === "storkok" ? DEFAULT_STORKOK : [];
      if (defaults.length > 0) {
        const init = {};
        defaults.forEach((item) => {
          const key = (item.artnr || item.name).replace(/[.#$/\[\]]/g, "_");
          init[key] = { name: item.name, unit: item.unit, qty: item.qty, min: item.min, brand: item.brand, price: item.price };
        });
        ref.set(init);
        items = init;
      } else {
        items = {};
      }
    }
    render();
  });
}

function switchDept(dept) {
  activeDept = dept; activeBrand = "Alla"; search = ""; showAddForm = false;
  listenToDept(dept);
}

function getItemsRef() { return db.ref("departments/" + activeDept + "/items"); }

// ====== BACKUP ======
const MAX_BACKUPS = 7;

async function autoBackup() {
  try {
    const snap = await db.ref("departments").once("value");
    const data = snap.val();
    if (!data) return;
    const today = new Date().toISOString().slice(0, 10);
    await db.ref("backups/" + today).set({ data, timestamp: Date.now(), user: currentUser.email });
    const backupsSnap = await db.ref("backups").once("value");
    const backups = backupsSnap.val();
    if (backups) {
      const keys = Object.keys(backups).sort();
      while (keys.length > MAX_BACKUPS) {
        await db.ref("backups/" + keys.shift()).remove();
      }
    }
  } catch (e) { console.error("Auto-backup misslyckades:", e); }
}

function exportData() {
  db.ref("departments").once("value").then(snap => {
    const data = snap.val();
    if (!data) { showToast("Inget att exportera"); return; }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "lager-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    showToast("Backup nedladdad!");
  });
}

async function importData() {
  const input = document.createElement("input");
  input.type = "file"; input.accept = ".json";
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const data = JSON.parse(await file.text());
      if (confirm("Vill du återställa lagret från backup? All nuvarande data ersätts.")) {
        await db.ref("departments").set(data);
        showToast("Lager återställt från backup!");
      }
    } catch (err) { showToast("Kunde inte läsa filen"); }
  };
  input.click();
}

// ====== LOG ======
function writeLog(entry) {
  db.ref("log").push().set({
    ...entry,
    who: currentUser ? (currentUser.displayName || currentUser.email) : "Okänd",
    timestamp: Date.now(),
    date: new Date().toISOString(),
  });
}

// ====== ITEMS ======
function updateItem(key, delta) {
  const item = items[key];
  if (!item) return;
  const oldQty = item.qty;
  const newQty = Math.max(0, oldQty + delta);
  getItemsRef().child(key).update({ qty: newQty });
  if (item.min > 0 && oldQty > item.min && newQty <= item.min) {
    sendTelegram({ ...item, qty: newQty });
  }
  writeLog({ action: delta > 0 ? "fill" : "take", item: item.name, brand: item.brand || "", delta, oldQty, newQty, dept: activeDept });
  showToast(`${item.name}: ${delta > 0 ? "+" + delta : delta} → ${newQty} ${item.unit}`);
}

function addItem(name, unit, qty, min, brand, price) {
  const key = name.replace(/[.#$/\[\]]/g, "_");
  const q = parseInt(qty) || 0;
  getItemsRef().child(key).set({ name, unit, qty: q, min: parseInt(min) || 0, brand: brand || "Övrigt", price: parseFloat(price) || 0 });
  writeLog({ action: "add", item: name, brand: brand || "Övrigt", delta: q, oldQty: 0, newQty: q, dept: activeDept });
  showToast(`${name} tillagd`);
}

// Filter items without re-rendering (fixes keyboard closing on mobile)
function filterItems() {
  const q = search.toLowerCase().trim();
  const container = document.querySelector(".items-list");
  if (!container) return;
  const words = q ? q.split(/\s+/) : [];
  const cards = Array.from(container.querySelectorAll(".item-card"));
  cards.forEach(card => {
    const name = card.dataset.name || "";
    const match = !words.length || words.every(w => name.includes(w));
    card.style.display = match ? "" : "none";
  });
}

// Module-level search matcher (used by both render() and ecSearchRender())
function ecMatchesSearch(e) {
  const q = ecSearch.trim().toUpperCase();
  const code = e.code.toUpperCase();
  if (code.startsWith(q)) return true;
  const qPrefix = q.replace(/[0-9:]/g, "").trim();
  const qDigits = q.replace(/[^0-9:]/g, "");
  if (qDigits) {
    const cPrefix = code.replace(/[0-9:]/g, "").trim();
    const cDigits = code.replace(/[^0-9:]/g, "");
    const prefixOk = !qPrefix || !cPrefix || qPrefix === cPrefix;
    if (prefixOk && (cDigits === qDigits || cDigits.startsWith(qDigits + ":") || cDigits.startsWith(qDigits))) return true;
  }
  if (!/\d/.test(q) && !/^[EFR]{1,3}$/i.test(q)) {
    const ql = q.toLowerCase();
    if (e.name.toLowerCase().includes(ql) || e.desc.toLowerCase().includes(ql) || e.machine.toLowerCase().includes(ql)) return true;
  }
  return false;
}

    // Sökning rensad — återställ vyn normalt

  const wrap = document.getElementById('ec-results-wrap');
  if (!wrap) { render(); return; }

  // Alltid ecMatchesSearch — aldrig in-place includes() som matchar beskrivning
  const filtered = ERROR_CODES.filter(e => ecMatchesSearch(e));
  const ecQ = ecSearch.trim().toUpperCase();
  filtered.sort((a, b) => {
    const aExact = a.code.toUpperCase() === ecQ, bExact = b.code.toUpperCase() === ecQ;
    if (aExact && !bExact) return -1;
    if (!aExact && bExact) return 1;
    const ca = a.code.toUpperCase(), cb = b.code.toUpperCase();
    const ma = ca.match(/^([A-Z\s]*)(\d+)/), mb = cb.match(/^([A-Z\s]*)(\d+)/);
    if (ma && mb) {
      if (ma[1] !== mb[1]) return ma[1] < mb[1] ? -1 : 1;
      const numDiff = parseInt(ma[2]) - parseInt(mb[2]);
      if (numDiff !== 0) return numDiff;
      const ra = ca.slice(ma[0].length), rb = cb.slice(mb[0].length);
      return ra < rb ? -1 : ra > rb ? 1 : 0;
    }
    return ca < cb ? -1 : ca > cb ? 1 : 0;
  });
  ecFilteredCodes = filtered;

  let html = `<div class="ec-count">${filtered.length} felkoder</div><div class="ec-section">`;
  filtered.forEach((e, i) => {
    html += `<div class="ec-card-wrap" data-search="${(e.code+' '+e.name+' '+e.desc+' '+e.machine).toLowerCase().replace(/"/g,'&quot;')}">
      <div class="ec-card" onclick="openEC(${i})">
        <div style="display:flex;align-items:center;gap:16px">
          <div class="ec-code">${e.code}</div>
          <div class="ec-name">${e.name} <span style="font-size:11px;color:var(--text-dim)">${e.machine}</span></div>
        </div>
      </div>
    </div>`;
  });
  html += `</div>`;
  wrap.innerHTML = html;
}
// Legacy alias
function filterEC() { ecSearchRender(); }

function ecNoteKey(e) {
  return (e.brand + "_" + e.machine + "_" + e.code).replace(/[.#$[\]/]/g, "_");
}

function openEC(i) {
  const e = ecFilteredCodes[i];
  if (!e) return;
  const codeKey = ecNoteKey(e);
  let html = `
    <div class="ec-popup-code">${e.code}</div>
    <div class="ec-popup-name">${e.name}</div>
    <div class="ec-popup-machine">${e.brand} — ${e.machine}</div>
    <div class="ec-popup-desc">${e.desc.replace(/\n/g, '<br>')}</div>`;
  if (e.partLinks && e.partLinks.length > 0) {
    const allItems = Object.values(items);
    const linked = e.partLinks.map(name => {
      const found = allItems.find(i => i.name.toLowerCase() === name.toLowerCase());
      return found
        ? `<div class="ec-popup-part">• ${found.name} — art.nr: <strong>${found.artnr || '—'}</strong> &nbsp;|&nbsp; ${found.qty} ${found.unit} i lager</div>`
        : `<div class="ec-popup-part">• ${name} — ej i lager</div>`;
    });
    const extra = (e.parts || []).map(p => `<div class="ec-popup-part">• ${p}</div>`);
    html += `<div class="ec-popup-parts">
      <div class="ec-popup-parts-title">🔩 Rekommenderade reservdelar</div>
      <div class="ec-popup-parts-note">📦 Saldo hämtat från lagret</div>
      ${linked.join("")}${extra.join("")}
    </div>`;
  } else if (e.parts && e.parts.length > 0) {
    html += `<div class="ec-popup-parts">
      <div class="ec-popup-parts-title">🔩 Reservdelar som kan behövas</div>
      <div class="ec-popup-parts-note">💡 Tips — kontrollera alltid innan beställning</div>
      ${e.parts.map(p => `<div class="ec-popup-part">• ${p}</div>`).join("")}
    </div>`;
  }
  html += `<div class="ec-notes">
    <div class="ec-notes-title">💬 Anteckningar</div>
    <div id="ec-notes-list">Laddar...</div>
    <div class="ec-note-add">
      <textarea class="ec-note-input" id="ec-note-input" placeholder="Skriv en anteckning..." rows="2"></textarea>
      <button class="ec-note-submit" onclick="doAddECNote('${codeKey}')">Spara</button>
    </div>
  </div>`;
  html += `<button class="ec-popup-close" onclick="closeEC()">Stäng</button>`;
  document.getElementById("ec-popup").innerHTML = html;
  document.getElementById("ec-overlay").classList.add("open");
  db.ref("ecNotes").orderByChild("codeKey").equalTo(codeKey).on("value", (snap) => {
    const notes = snap.val();
    const listEl = document.getElementById("ec-notes-list");
    if (!listEl) return;
    if (!notes) { listEl.innerHTML = '<div style="font-size:13px;color:var(--text-dim)">Inga anteckningar ännu.</div>'; return; }
    const sorted = Object.entries(notes).sort((a, b) => b[1].timestamp - a[1].timestamp);
    listEl.innerHTML = sorted.map(([id, n]) => {
      const isOwn = currentUser && n.userId === currentUser.uid;
      const canAct = isAdmin || isOwn;
      return `
      <div class="ec-note">
        <div class="ec-note-body">
          <div class="ec-note-text">${n.text.replace(/</g, "&lt;")}</div>
          <div class="ec-note-meta">${n.userName} · ${new Date(n.timestamp).toLocaleDateString("sv-SE")}</div>
        </div>
        ${canAct ? `<div class="ec-note-actions">
          <button class="ec-note-edit" onclick="doEditECNote('${id}', this)" title="Redigera">✏️</button>
          <button class="ec-note-del" onclick="doDeleteECNote('${id}')" title="Ta bort">🗑️</button>
        </div>` : ""}
      </div>`;
    }).join("");
  });
}

function closeEC() {
  const overlay = document.getElementById("ec-overlay");
  if (overlay) overlay.classList.remove("open");
  db.ref("ecNotes").off();
}

async function doAddECNote(codeKey) {
  const input = document.getElementById("ec-note-input");
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  await db.ref("ecNotes").push({
    codeKey,
    text,
    userName: currentUser.displayName || currentUser.email,
    userId: currentUser.uid,
    timestamp: Date.now()
  });
}

function doEditECNote(noteId, btn) {
  const noteEl = btn.closest(".ec-note");
  const textEl = noteEl.querySelector(".ec-note-text");
  const origText = textEl.textContent;
  noteEl.dataset.origText = origText;
  textEl.outerHTML = `<textarea class="ec-note-input" id="ec-edit-${noteId}" rows="2">${origText.replace(/</g, "&lt;")}</textarea>`;
  const actionsEl = btn.closest(".ec-note-actions");
  actionsEl.innerHTML = `
    <button class="ec-note-edit" onclick="doSaveECNote('${noteId}')" title="Spara">💾</button>
    <button class="ec-note-del" onclick="doCancelECEdit('${noteId}', this)" title="Avbryt">✕</button>`;
}

function doCancelECEdit(noteId, btn) {
  const noteEl = btn.closest(".ec-note");
  const origText = (noteEl.dataset.origText || "").replace(/</g, "&lt;");
  const textarea = document.getElementById("ec-edit-" + noteId);
  if (textarea) textarea.outerHTML = `<div class="ec-note-text">${origText}</div>`;
  const actionsEl = btn.closest(".ec-note-actions");
  actionsEl.innerHTML = `
    <button class="ec-note-edit" onclick="doEditECNote('${noteId}', this)" title="Redigera">✏️</button>
    <button class="ec-note-del" onclick="doDeleteECNote('${noteId}')" title="Ta bort">🗑️</button>`;
}

async function doSaveECNote(noteId) {
  const input = document.getElementById("ec-edit-" + noteId);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  await db.ref("ecNotes/" + noteId).update({ text });
}

async function doDeleteECNote(noteId) {
  if (isAdmin) { await db.ref("ecNotes/" + noteId).remove(); return; }
  const snap = await db.ref("ecNotes/" + noteId).once("value");
  const note = snap.val();
  if (note && currentUser && note.userId === currentUser.uid) {
    await db.ref("ecNotes/" + noteId).remove();
  }
}


// ====== ACTIONS ======
function doTake(key) {
  const sel = document.getElementById("sel_" + key);
  const num = parseInt(sel.value);
  if (!num || num <= 0) return;
  updateItem(key, -num);
  sel.value = "1";
}

function doFill(key) {
  const sel = document.getElementById("sel_" + key);
  const num = parseInt(sel.value);
  if (!num || num <= 0) return;
  updateItem(key, num);
  sel.value = "1";
}

function doAddItem() {
  const name = document.getElementById("add_name").value.trim();
  if (!name) return;
  addItem(name, document.getElementById("add_unit").value, document.getElementById("add_qty").value, document.getElementById("add_min").value, document.getElementById("add_brand").value.trim(), document.getElementById("add_price").value);
  showAddForm = false;
  render();
}

function toggleEdit(key) {
  editingItem = editingItem === key ? null : key;
  render();
}

function doSaveEdit(key) {
  const min = parseInt(document.getElementById("edit_min_" + key).value) || 0;
  const price = parseFloat(document.getElementById("edit_price_" + key).value) || 0;
  getItemsRef().child(key).update({ min, price });
  editingItem = null;
  showToast("Uppdaterad!");
}

function doDeleteItem(key) {
  const item = items[key];
  if (!item) return;
  if (confirm(`Ta bort ${item.name}?`)) {
    getItemsRef().child(key).remove();
    editingItem = null;
    showToast(`${item.name} borttagen`);
  }
}

</script>

<script>
// ===== ADD ITEM =====
function onCameraPhoto() {
  const input = document.getElementById('cameraInput');
  if (!input.files[0]) return;
  // Clear form and show overlay
  document.getElementById('scanF_name').value = '';
  document.getElementById('scanF_artnr').value = '';
  document.getElementById('scanF_qty').value = 1;
  document.getElementById('scanF_price').value = 0;
  document.getElementById('scanOverlay').classList.remove('hidden');
  input.value = '';
}

function scanAddItem() {
  const name = document.getElementById('scanF_name').value.trim();
  const artnr = document.getElementById('scanF_artnr').value.trim();
  const qty = parseInt(document.getElementById('scanF_qty').value) || 0;
  const price = parseFloat(document.getElementById('scanF_price').value) || 0;
  if (!name) { showToast('❌ Ange artikelnamn'); return; }
  const key = name.replace(/[.#$/\[\]]/g, "_");
  getItemsRef().child(key).set({ name, unit: 'st', qty, min: 0, brand: activeBrand !== 'Alla' ? activeBrand : 'Övrigt', price, artnr });
  writeLog({ action: 'add', item: name, brand: activeBrand !== 'Alla' ? activeBrand : 'Övrigt', delta: qty, oldQty: 0, newQty: qty, dept: activeDept });
  showToast('✅ ' + name + ' tillagd');
  closeScan();
}

function closeScan() {
  document.getElementById('scanOverlay').classList.add('hidden');
}

function dismissKeyboard() {
  const el = document.activeElement;
  if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
    el.setAttribute('readonly', 'readonly');
    el.blur();
    setTimeout(() => el.removeAttribute('readonly'), 100);
  }
}
</script>
